    <link rel="stylesheet" href="../css/nuevo_proyecto.css">

</head>
<body>
    <header>
        <div class="logos">
            <span><img class="logo_cliente" src="../img/Rikkimaka.jpg" alt="Logo Rikkimaka"></span>
            <span class="cliente">Rikimakka</span> 
        </div>
        <nav class="main-nav">
            <a href="./portal_it.html">Inicio</a> 
            <a href="./pagina_temporal.html">Colaboradores</a> 
            <a href="./pagina_temporal.html">Proyectos</a> 
            <a href="./nuevo_proyecto.html" class="active">Nuevo Proyecto</a> 
        </nav>
        <div class="usuario">
            <span class="icono-usuario"></span>
            <span class="nombre-usuario">Carlos Martínez</span>
        </div>
    </header>

    <main class="contenedor-principal">
        <h1 class="titulo-pagina">Crear Nuevo Proyecto</h1>

        <section class="contenedor-formulario">
            <form action="#" method="post">
                <div class="grid-formulario">
                    <div class="grupo-input">
                        <label for="nombre_proyecto">
                            <i class="fas fa-folder icon-blue"></i> Nombre del Proyecto
                        </label>
                        <input type="text" id="nombre_proyecto" name="nombre_proyecto" placeholder="Ej: Desarrollo de Plataforma Web">
                    </div>
                    <div class="grupo-input">
                        <label for="presupuesto">
                            <i class="fas fa-dollar-sign icon-green"></i> Presupuesto
                        </label>
                        <input type="text" id="presupuesto" name="presupuesto" placeholder="Ej: $50,000">
                    </div>

                    <div class="grupo-input">
                        <label for="recursos">
                            <i class="fas fa-users icon-purple"></i> Recursos Asignados
                        </label>
                        <input type="text" id="recursos" name="recursos" placeholder="Ej: 5 desarrolladores, 2 diseñadores">
                    </div>
                    <div class="grupo-input">
                        <label for="fecha_inicio">
                            <i class="far fa-calendar-alt icon-blue"></i> Fecha de Inicio
                        </label>
                        <input type="date" id="fecha_inicio" name="fecha_inicio">
                    </div>

                    <div class="grupo-input">
                        <label for="fecha_fin">
                            <i class="far fa-calendar-check icon-orange"></i> Fecha de Finalización
                        </label>
                        <input type="date" id="fecha_fin" name="fecha_fin">
                    </div>
                    <div></div> <div class="grupo-input ancho-completo">
                        <label for="descripcion">
                            <i class="fas fa-file-alt icon-gray"></i> Descripción
                        </label>
                        <textarea id="descripcion" name="descripcion" rows="6" placeholder="Describa los objetivos, alcance y detalles relevantes del proyecto..."></textarea>
                    </div>
                </div>

                <div class="barra-botones">
                    <button type="button" class="btn-secundario">Cancelar</button>
                    <button type="submit" class="btn-primario">Guardar Proyecto</button>
                </div>
            </form>
        </section>
    </main>
